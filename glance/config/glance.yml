server:
  proxied: true
  assets-path: /app/assets

document:
  head: |
    <style>
      :root {
        --border-radius: 10px;
      }

      /* ── Page & layout ── */
      .page {
        gap: 1rem;
      }

      /* ── Widget card styling ── */
      .widget {
        border: 1px solid hsl(var(--color-primary) / 0.18);
        box-shadow:
          0 1px 3px hsl(220 30% 60% / 0.08),
          0 6px 20px hsl(220 30% 50% / 0.07);
        border-radius: 10px;
      }

      .widget-header {
        padding-bottom: 0.45rem;
        border-bottom: 1px solid hsl(var(--color-primary) / 0.1);
        margin-bottom: 0.6rem;
      }

      /* ── Monitor & bookmarks ── */
      .monitor-site,
      .bookmarks-link {
        border-radius: 8px;
      }

      /* ── Bookmarks: subtle hover lift ── */
      .bookmarks-link:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px hsl(220 30% 50% / 0.12);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }

      /* ── Clock: make it feel premium ── */
      .widget-type-clock .size-h1 {
        letter-spacing: -0.03em;
      }
    </style>

branding:
  app-name: Homelab
  logo-text: HL
  hide-footer: true

theme:
  light: true
  background-color: 220 23 95
  primary-color: 220 91 54
  positive-color: 109 58 40
  negative-color: 347 87 44
  contrast-multiplier: 1.1
  text-saturation-multiplier: 0.8

pages:
  $include: home.yml